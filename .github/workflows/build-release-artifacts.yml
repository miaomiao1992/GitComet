name: Build Release Artifacts

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      version:
        required: true
        type: string
      deb_revision:
        required: false
        type: string
        default: "1"
      release_id:
        required: false
        type: string
    secrets:
      AZURE_CREDENTIALS:
        required: false
      MACOS_SIGNING_IDENTITY:
        required: false
      MACOS_SIGNING_CERT_BASE64:
        required: false
      MACOS_SIGNING_CERT_PASSWORD:
        required: false
      MACOS_NOTARY_KEY_ID:
        required: false
      MACOS_NOTARY_ISSUER_ID:
        required: false
      MACOS_NOTARY_API_KEY_P8:
        required: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build from (e.g. v0.2.0)"
        required: true
        type: string
      version:
        description: "Optional version override (e.g. 0.2.0). If omitted, derived from tag."
        required: false
        type: string
      deb_revision:
        description: "Debian package revision suffix appended to the upstream version (e.g. 1 for 1.2.3-1)."
        required: true
        default: "1"
        type: string
      release_id:
        description: "Optional release id for manual backfills"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: build-release-artifacts-${{ inputs.tag || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  WIXTOOLSET_VERSION: 3.14.1.20250415
  CARGO_WIX_VERSION: 0.3.9
  APPIMAGETOOL_VERSION: 1.9.1
  APPIMAGETOOL_X86_64_SHA256: ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0

jobs:
  prepare:
    name: Normalize release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.norm.outputs.tag }}
      version: ${{ steps.norm.outputs.version }}
      deb_revision: ${{ steps.norm.outputs.deb_revision }}
      release_id: ${{ steps.norm.outputs.release_id }}
    steps:
      - name: Normalize tag and version
        id: norm
        env:
          INPUT_TAG: ${{ inputs.tag }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          INPUT_DEB_REVISION: ${{ inputs.deb_revision }}
          DISPATCH_DEB_REVISION: ${{ github.event.inputs.deb_revision }}
          INPUT_RELEASE_ID: ${{ inputs.release_id }}
          DISPATCH_RELEASE_ID: ${{ github.event.inputs.release_id }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${DISPATCH_TAG:-}}"
          version="${INPUT_VERSION:-${DISPATCH_VERSION:-}}"
          deb_revision="${INPUT_DEB_REVISION:-${DISPATCH_DEB_REVISION:-1}}"
          release_id="${INPUT_RELEASE_ID:-${DISPATCH_RELEASE_ID:-}}"

          tag="$(echo "$tag" | tr -d '[:space:]')"
          version="$(echo "$version" | tr -d '[:space:]')"
          deb_revision="$(echo "$deb_revision" | tr -d '[:space:]')"
          release_id="$(echo "$release_id" | tr -d '[:space:]')"

          if [ -z "$tag" ]; then
            echo "::error title=Missing tag::Tag is required."
            exit 1
          fi

          if [[ "$tag" != v* ]]; then
            tag="v${tag}"
          fi

          if [ -z "$version" ]; then
            version="${tag#v}"
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "::error title=Invalid version::Expected semver like 1.2.3 or 1.2.3-rc.1."
            exit 1
          fi

          if [ "$tag" != "v${version}" ]; then
            echo "::error title=Tag/version mismatch::Tag '$tag' does not match version '$version'."
            exit 1
          fi

          if ! [[ "$deb_revision" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error title=Invalid Debian revision::Expected a positive integer like 1, 2, or 3."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "deb_revision=$deb_revision" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build_windows:
    name: Build Windows artifacts (${{ matrix.target_platform }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_platform: x86_64-windows
            artifact_arch: x86_64
            runs_on: windows-latest
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
      ARTIFACT_ARCH: ${{ matrix.artifact_arch }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      WINDOWS_SIGNING_ENDPOINT: ${{ vars.WINDOWS_SIGNING_ENDPOINT }}
      WINDOWS_SIGNING_ACCOUNT_NAME: ${{ vars.WINDOWS_SIGNING_ACCOUNT_NAME }}
      WINDOWS_SIGNING_PROFILE_NAME: ${{ needs.prepare.outputs.release_id != '' && 'gitcomet-windows-release' || 'gitcomet-windows-test' }}
      WINDOWS_SIGNING_TIMESTAMP_RFC3161: http://timestamp.acs.microsoft.com/
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate Windows signing configuration
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $required = @(
            "AZURE_CREDENTIALS",
            "WINDOWS_SIGNING_ENDPOINT",
            "WINDOWS_SIGNING_ACCOUNT_NAME"
          )
          $missing = @()

          foreach ($name in $required) {
            $value = [Environment]::GetEnvironmentVariable($name)
            if ([string]::IsNullOrWhiteSpace($value)) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            throw "Missing required Windows signing secret(s)/variable(s): $($missing -join ', ')"
          }

          Write-Host "Using Windows signing profile: $env:WINDOWS_SIGNING_PROFILE_NAME"

      - name: Log into Azure for Windows signing
        uses: azure/login@v3
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Locate SignTool
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $kitsRoot = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\bin"
          $signTool = Get-ChildItem -Path $kitsRoot -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\x64\\' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if ([string]::IsNullOrWhiteSpace($signTool)) {
            $signTool = Get-ChildItem -Path $kitsRoot -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if ([string]::IsNullOrWhiteSpace($signTool)) {
            throw "Unable to locate signtool.exe on the GitHub Actions runner."
          }

          "SIGNTOOL_PATH=$signTool" >> $env:GITHUB_ENV

      - name: Build release binary
        shell: pwsh
        run: |
          cargo build -p gitcomet --release --locked --features ui-gpui,gix --bin gitcomet

      - name: Sign Windows release binary
        uses: Azure/artifact-signing-action@v1
        with:
          endpoint: ${{ env.WINDOWS_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.WINDOWS_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.WINDOWS_SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\target\release
          files-folder-filter: gitcomet.exe
          file-digest: SHA256
          timestamp-rfc3161: ${{ env.WINDOWS_SIGNING_TIMESTAMP_RFC3161 }}
          timestamp-digest: SHA256
          append-signature: false

      - name: Verify signed Windows release binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $artifactPath = Join-Path $env:GITHUB_WORKSPACE "target\release\gitcomet.exe"
          & "$env:GITHUB_WORKSPACE\scripts\windows\verify-signed-artifact.ps1" `
            -Path $artifactPath `
            -SignToolPath $env:SIGNTOOL_PATH

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path dist\portable -Force | Out-Null
          Copy-Item target\release\gitcomet.exe dist\portable\gitcomet.exe -Force
          Copy-Item README.md dist\portable\README.md -Force
          Copy-Item LICENSE-AGPL-3.0 dist\portable\LICENSE-AGPL-3.0 -Force
          Copy-Item NOTICE dist\portable\NOTICE -Force

          $zipName = "gitcomet-v${env:VERSION}-windows-${env:ARTIFACT_ARCH}-portable.zip"
          if (Test-Path "dist\$zipName") { Remove-Item "dist\$zipName" -Force }
          Compress-Archive -Path dist\portable\* -DestinationPath "dist\$zipName"

      - name: Build MSI installer (WiX)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install wixtoolset --version "${env:WIXTOOLSET_VERSION}" --yes --no-progress
          cargo install cargo-wix --version "${env:CARGO_WIX_VERSION}" --locked

          # Chocolatey updates machine-level env vars, but the current pwsh session does not pick them up automatically.
          $wixRoot = [Environment]::GetEnvironmentVariable("WIX", "Machine")
          if ([string]::IsNullOrWhiteSpace($wixRoot)) {
            $candidateRoots = @()
            if (${env:ProgramFiles(x86)}) {
              $candidateRoots += (Join-Path ${env:ProgramFiles(x86)} "WiX Toolset v3.14")
            }
            if ($env:ProgramFiles) {
              $candidateRoots += (Join-Path $env:ProgramFiles "WiX Toolset v3.14")
            }
            $wixRoot = $candidateRoots |
              Where-Object { Test-Path (Join-Path $_ "bin\candle.exe") } |
              Select-Object -First 1
          }
          if ([string]::IsNullOrWhiteSpace($wixRoot)) {
            throw "Unable to locate the WiX Toolset installation after Chocolatey install."
          }
          $wixBin = $wixRoot
          if (!(Test-Path (Join-Path $wixBin "candle.exe"))) {
            $wixBin = Join-Path $wixRoot "bin"
          }
          if (!(Test-Path (Join-Path $wixBin "candle.exe"))) {
            throw "WiX Toolset bin directory '$wixBin' does not contain candle.exe."
          }
          $env:WIX = Split-Path $wixBin -Parent
          $env:PATH = "$wixBin;$env:PATH"

          if (!(Test-Path "crates\gitcomet\wix\main.wxs")) {
            cargo wix init --package gitcomet
          }
          $msiName = "gitcomet-v${env:VERSION}-windows-${env:ARTIFACT_ARCH}.msi"
          cargo wix --package gitcomet --profile release --nocapture --no-build --bin-path "$wixBin" --output "dist\$msiName"

      - name: Sign Windows MSI installer
        uses: Azure/artifact-signing-action@v1
        with:
          endpoint: ${{ env.WINDOWS_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.WINDOWS_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.WINDOWS_SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: gitcomet-v${{ env.VERSION }}-windows-${{ env.ARTIFACT_ARCH }}.msi
          file-digest: SHA256
          timestamp-rfc3161: ${{ env.WINDOWS_SIGNING_TIMESTAMP_RFC3161 }}
          timestamp-digest: SHA256
          append-signature: false

      - name: Verify signed Windows MSI installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $artifactPath = Join-Path $env:GITHUB_WORKSPACE "dist\gitcomet-v$($env:VERSION)-windows-$($env:ARTIFACT_ARCH).msi"
          & "$env:GITHUB_WORKSPACE\scripts\windows\verify-signed-artifact.ps1" `
            -Path $artifactPath `
            -SignToolPath $env:SIGNTOOL_PATH

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-artifacts-${{ matrix.target_platform }}
          path: |
            dist/*.zip
            dist/*.msi
          if-no-files-found: error
          retention-days: 7

  build_linux:
    name: Build Linux artifacts (${{ matrix.target_platform }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_platform: x86_64-linux
            artifact_arch: x86_64
            deb_arch: amd64
            runs_on: ubuntu-24.04
            build_appimage: true
          - target_platform: aarch64-linux
            artifact_arch: arm64
            deb_arch: arm64
            runs_on: ubuntu-24.04-arm
            build_appimage: false
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
      DEB_REVISION: ${{ needs.prepare.outputs.deb_revision }}
      ARTIFACT_ARCH: ${{ matrix.artifact_arch }}
      DEB_ARCH: ${{ matrix.deb_arch }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Install Linux UI native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            dpkg-dev \
            pkg-config \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p gitcomet --release --locked --features ui-gpui,gix

      - name: Normalize desktop entry metadata
        run: |
          set -euo pipefail
          mkdir -p dist
          # Backward compatibility for older tags that used non-standard categories.
          sed 's/VersionControl;/RevisionControl;/g' assets/linux/gitcomet.desktop > dist/gitcomet.desktop
          desktop-file-validate dist/gitcomet.desktop

      - name: Package tar.gz
        run: |
          set -euo pipefail
          root="gitcomet-v${VERSION}-linux-${ARTIFACT_ARCH}"
          mkdir -p "dist/stage/${root}"
          install -m755 target/release/gitcomet "dist/stage/${root}/gitcomet"
          install -m644 README.md "dist/stage/${root}/README.md"
          install -m644 LICENSE-AGPL-3.0 "dist/stage/${root}/LICENSE-AGPL-3.0"
          install -m644 NOTICE "dist/stage/${root}/NOTICE"
          tar -C dist/stage -czf "dist/${root}.tar.gz" "${root}"

      - name: Package .deb
        run: |
          set -euo pipefail
          deb_upstream_version="${VERSION/-rc./~rc.}"
          deb_revision="${DEB_REVISION}"
          deb_version="${deb_upstream_version}-${deb_revision}"
          pkg_root="dist/deb-root"
          mkdir -p "${pkg_root}/DEBIAN"
          mkdir -p "${pkg_root}/usr/bin"
          mkdir -p "${pkg_root}/usr/share/applications"
          mkdir -p "${pkg_root}/usr/share/icons/hicolor/512x512/apps"

          install -m755 target/release/gitcomet "${pkg_root}/usr/bin/gitcomet"
          install -m644 dist/gitcomet.desktop "${pkg_root}/usr/share/applications/gitcomet.desktop"
          install -m644 assets/gitcomet-512.png "${pkg_root}/usr/share/icons/hicolor/512x512/apps/gitcomet.png"

          shlib_depends="$(dpkg-shlibdeps -O "${pkg_root}/usr/bin/gitcomet" | sed -n 's/^shlibs:Depends=//p')"
          depends="git"
          if [[ -n "${shlib_depends}" ]]; then
            depends="${depends}, ${shlib_depends}"
          fi

          {
            echo "Package: gitcomet"
            echo "Version: ${deb_version}"
            echo "Architecture: ${DEB_ARCH}"
            echo "Maintainer: AutoExplore Oy <info@autoexplore.ai>"
            echo "Depends: ${depends}"
            echo "Section: utils"
            echo "Priority: optional"
            echo "Description: Fast, resource-efficient Git GUI written in Rust."
          } > "${pkg_root}/DEBIAN/control"

          dpkg-deb --build "${pkg_root}" "dist/gitcomet_${deb_version}_${DEB_ARCH}.deb"

      - name: Package AppImage
        if: ${{ matrix.build_appimage }}
        run: |
          set -euo pipefail
          appdir="dist/AppDir"
          mkdir -p "${appdir}/usr/bin"
          install -m755 target/release/gitcomet "${appdir}/usr/bin/gitcomet"
          install -m644 dist/gitcomet.desktop "${appdir}/gitcomet.desktop"
          install -m644 assets/gitcomet-512.png "${appdir}/gitcomet.png"

          {
            echo '#!/usr/bin/env bash'
            echo 'set -euo pipefail'
            echo 'HERE="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"'
            echo 'exec "${HERE}/usr/bin/gitcomet" "$@"'
          } > "${appdir}/AppRun"
          chmod +x "${appdir}/AppRun"

          curl -fsSL \
            "https://github.com/AppImage/appimagetool/releases/download/${APPIMAGETOOL_VERSION}/appimagetool-x86_64.AppImage" \
            -o /tmp/appimagetool.AppImage
          echo "${APPIMAGETOOL_X86_64_SHA256}  /tmp/appimagetool.AppImage" | sha256sum -c -
          chmod +x /tmp/appimagetool.AppImage
          ARCH=x86_64 /tmp/appimagetool.AppImage --appimage-extract-and-run \
            "${appdir}" "dist/gitcomet-v${VERSION}-linux-${ARTIFACT_ARCH}.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-artifacts-${{ matrix.target_platform }}
          path: |
            dist/*.tar.gz
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
          retention-days: 7

  build_macos:
    name: Build macOS artifacts (${{ matrix.target_platform }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_platform: aarch64-darwin
            arch: arm64
            runs_on: macos-latest
          - target_platform: x86_64-darwin
            arch: x86_64
            runs_on: macos-15-intel
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
      ARCH: ${{ matrix.arch }}
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      MACOS_SIGNING_CERT_BASE64: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
      MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
      MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
      MACOS_NOTARY_API_KEY_P8: ${{ secrets.MACOS_NOTARY_API_KEY_P8 }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Determine macOS signing mode
        id: macos_signing_mode
        run: |
          set -euo pipefail

          required=(
            MACOS_SIGNING_IDENTITY
            MACOS_SIGNING_CERT_BASE64
            MACOS_SIGNING_CERT_PASSWORD
            MACOS_NOTARY_KEY_ID
            MACOS_NOTARY_ISSUER_ID
            MACOS_NOTARY_API_KEY_P8
          )
          present=()
          missing=()

          for name in "${required[@]}"; do
            if [ -n "${!name:-}" ]; then
              present+=("$name")
            else
              missing+=("$name")
            fi
          done

          if [ "${#present[@]}" -eq 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing is not configured; building unsigned macOS artifacts."
            exit 0
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error title=Incomplete macOS signing configuration::Missing required secret(s): ${missing[*]}"
            echo "::error title=Partial macOS signing configuration::Either provide all macOS signing and notarization secrets or leave them all unset to build unsigned artifacts."
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Prepare macOS signing and notarization credentials
        if: ${{ steps.macos_signing_mode.outputs.enabled == 'true' }}
        id: macos_signing
        run: |
          set -euo pipefail

          keychain_path="${RUNNER_TEMP}/gitcomet-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          cert_path="${RUNNER_TEMP}/gitcomet-signing-cert.p12"
          api_key_path="${RUNNER_TEMP}/AuthKey_${MACOS_NOTARY_KEY_ID}.p8"
          default_keychain="$(security default-keychain -d user | tr -d '"' | xargs)"

          if base64 --help 2>&1 | grep -q -- '--decode'; then
            printf '%s' "$MACOS_SIGNING_CERT_BASE64" | base64 --decode > "$cert_path"
          else
            printf '%s' "$MACOS_SIGNING_CERT_BASE64" | base64 -D > "$cert_path"
          fi

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$MACOS_SIGNING_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security default-keychain -d user -s "$keychain_path"

          security find-identity -v -p codesigning "$keychain_path"

          printf '%s' "$MACOS_NOTARY_API_KEY_P8" > "$api_key_path"
          chmod 600 "$api_key_path"

          echo "keychain_path=$keychain_path" >> "$GITHUB_OUTPUT"
          echo "api_key_path=$api_key_path" >> "$GITHUB_OUTPUT"
          echo "default_keychain=$default_keychain" >> "$GITHUB_OUTPUT"

      - name: Package macOS release assets
        run: |
          set -euo pipefail
          package_args=(
            --version "${VERSION}"
            --arch "${ARCH}"
            --release
            --out-dir dist
          )

          if [ "${{ steps.macos_signing_mode.outputs.enabled }}" = "true" ]; then
            package_args+=(
              --codesign-identity "${MACOS_SIGNING_IDENTITY}"
              --codesign-keychain "${{ steps.macos_signing.outputs.keychain_path }}"
            )
          else
            echo "Building unsigned macOS artifacts because signing is not configured."
          fi

          scripts/package-macos.sh "${package_args[@]}"

      - name: Notarize and verify macOS artifacts
        if: ${{ steps.macos_signing_mode.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          scripts/notarize-macos.sh \
            --version "${VERSION}" \
            --arch "${ARCH}" \
            --out-dir dist \
            --api-key "${{ steps.macos_signing.outputs.api_key_path }}" \
            --key-id "${MACOS_NOTARY_KEY_ID}" \
            --issuer "${MACOS_NOTARY_ISSUER_ID}"

      - name: Cleanup macOS signing keychain
        if: ${{ always() && steps.macos_signing_mode.outputs.enabled == 'true' }}
        env:
          KEYCHAIN_PATH: ${{ steps.macos_signing.outputs.keychain_path }}
          DEFAULT_KEYCHAIN_PATH: ${{ steps.macos_signing.outputs.default_keychain }}
          API_KEY_PATH: ${{ steps.macos_signing.outputs.api_key_path }}
        run: |
          set -euo pipefail
          if [ -n "${DEFAULT_KEYCHAIN_PATH:-}" ]; then
            security default-keychain -d user -s "$DEFAULT_KEYCHAIN_PATH" || true
          fi
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          if [ -n "${API_KEY_PATH:-}" ] && [ -f "$API_KEY_PATH" ]; then
            rm -f "$API_KEY_PATH"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-artifacts-${{ matrix.target_platform }}
          path: |
            dist/*.tar.gz
            dist/*.dmg
          if-no-files-found: error
          retention-days: 7

  publish_release_assets:
    name: Attach assets and checksums to GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [prepare, build_windows, build_linux, build_macos]
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
      ENABLE_KEYLESS_SIGNING: ${{ vars.ENABLE_KEYLESS_SIGNING }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          pattern: windows-release-artifacts-*
          path: dist/windows
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          pattern: linux-release-artifacts-*
          path: dist/linux
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          pattern: macos-release-artifacts-*
          path: dist/macos
          merge-multiple: true

      - name: Assemble release payload
        run: |
          set -euo pipefail
          mkdir -p dist/release
          find dist/windows -maxdepth 1 -type f -exec cp -f {} dist/release/ \;
          find dist/linux -maxdepth 1 -type f -exec cp -f {} dist/release/ \;
          find dist/macos -maxdepth 1 -type f -exec cp -f {} dist/release/ \;
          file_count="$(find dist/release -maxdepth 1 -type f | wc -l | tr -d '[:space:]')"
          if [ "${file_count}" = "0" ]; then
            echo "::error title=No release artifacts::No files were assembled into dist/release."
            exit 1
          fi
          ls -lah dist/release

      - name: Generate Homebrew cask and formula
        run: |
          set -euo pipefail
          arm_tar="gitcomet-v${VERSION}-macos-arm64.tar.gz"
          intel_tar="gitcomet-v${VERSION}-macos-x86_64.tar.gz"
          linux_arm_tar="gitcomet-v${VERSION}-linux-arm64.tar.gz"
          linux_intel_tar="gitcomet-v${VERSION}-linux-x86_64.tar.gz"
          arm_dmg="gitcomet-v${VERSION}-macos-arm64.dmg"
          intel_dmg="gitcomet-v${VERSION}-macos-x86_64.dmg"
          arm_path="dist/release/${arm_tar}"
          intel_path="dist/release/${intel_tar}"
          linux_arm_path="dist/release/${linux_arm_tar}"
          linux_intel_path="dist/release/${linux_intel_tar}"
          arm_dmg_path="dist/release/${arm_dmg}"
          intel_dmg_path="dist/release/${intel_dmg}"

          if [ ! -f "${arm_path}" ] || [ ! -f "${intel_path}" ] || [ ! -f "${linux_arm_path}" ] || [ ! -f "${linux_intel_path}" ] || [ ! -f "${arm_dmg_path}" ] || [ ! -f "${intel_dmg_path}" ]; then
            echo "::error title=Missing release assets::Expected ${arm_tar}, ${intel_tar}, ${linux_arm_tar}, ${linux_intel_tar}, ${arm_dmg}, and ${intel_dmg} in dist/release."
            exit 1
          fi

          scripts/generate-homebrew-formula.sh \
            --version "${VERSION}" \
            --github-repo "${GITHUB_REPOSITORY}" \
            --arm-tar "${arm_path}" \
            --intel-tar "${intel_path}" \
            --linux-arm-tar "${linux_arm_path}" \
            --linux-intel-tar "${linux_intel_path}" \
            --output "dist/release/gitcomet-cli.rb"

          scripts/generate-homebrew-cask.sh \
            --version "${VERSION}" \
            --github-repo "${GITHUB_REPOSITORY}" \
            --arm-dmg "${arm_dmg_path}" \
            --intel-dmg "${intel_dmg_path}" \
            --output "dist/release/gitcomet.rb"

      - name: Generate checksums
        run: |
          set -euo pipefail
          pushd dist/release >/dev/null
          md5_file="gitcomet-v${VERSION}-checksums.md5"
          sha_file="gitcomet-v${VERSION}-checksums.sha256"

          find . -maxdepth 1 -type f \
            ! -name "*checksums*" \
            -printf "%P\n" \
            | LC_ALL=C sort > /tmp/release_files.txt

          xargs -I{} md5sum "{}" < /tmp/release_files.txt > "$md5_file"
          xargs -I{} sha256sum "{}" < /tmp/release_files.txt > "$sha_file"
          popd >/dev/null

      - name: Install cosign
        if: ${{ env.ENABLE_KEYLESS_SIGNING == 'true' }}
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256 checksums with keyless signing
        if: ${{ env.ENABLE_KEYLESS_SIGNING == 'true' }}
        run: |
          set -euo pipefail
          sha_file="dist/release/gitcomet-v${VERSION}-checksums.sha256"
          sig_file="dist/release/gitcomet-v${VERSION}-checksums.sha256.sig"
          cert_file="dist/release/gitcomet-v${VERSION}-checksums.sha256.pem"
          cosign sign-blob --yes \
            --output-signature "$sig_file" \
            --output-certificate "$cert_file" \
            "$sha_file"

      - name: Upload payload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-payload
          path: dist/release/*
          if-no-files-found: error
          retention-days: 7

      - name: Upload assets to GitHub release
        if: ${{ env.RELEASE_ID != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          gh release upload "$TAG" dist/release/* --clobber --repo "$GITHUB_REPOSITORY"

      - name: Emit release summary
        run: |
          set -euo pipefail
          uploaded="no"
          if [ -n "${RELEASE_ID}" ]; then
            uploaded="yes"
          fi
          {
            echo "### Built release artifacts"
            echo ""
            echo "- Tag: \`$TAG\`"
            echo "- Version: \`$VERSION\`"
            echo "- Release upload attempted: \`${uploaded}\`"
            echo ""
            echo "Files:"
            ls -1 dist/release | sed 's/^/- `/;s/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"
