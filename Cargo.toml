[workspace]
resolver = "3"
members = [
  "crates/gitcomet-app",
  "crates/gitcomet-core",
  "crates/gitcomet-git",
  "crates/gitcomet-git-gix",
  "crates/gitcomet-state",
  "crates/gitcomet-ui",
  "crates/gitcomet-ui-gpui",
]

default-members = [
  "crates/gitcomet-app",
  "crates/gitcomet-core",
  "crates/gitcomet-git",
  "crates/gitcomet-git-gix",
  "crates/gitcomet-state",
  "crates/gitcomet-ui",
  "crates/gitcomet-ui-gpui",
]

[workspace.package]
edition = "2024"
license = "AGPL-3.0-only"
authors = ["AutoExplore Oy <info@autoexplore.ai>"]
repository = "https://github.com/Auto-Explore/GitComet"
rust-version = "1.94.0"

[workspace.dependencies]
# Internal crates
gitcomet-core = { path = "crates/gitcomet-core" }
gitcomet-git = { path = "crates/gitcomet-git" }
gitcomet-git-gix = { path = "crates/gitcomet-git-gix" }
gitcomet-state = { path = "crates/gitcomet-state" }
gitcomet-ui = { path = "crates/gitcomet-ui" }
gitcomet-ui-gpui = { path = "crates/gitcomet-ui-gpui" }

# External crates
clap = { version = "4", features = ["derive"] }
criterion = "0.8"
gix = "0.80"
globset = "0.4"
gpui = "0.2.2"
mimalloc = { version = "0.1", features = ["v3"] }
notify = "8"
regex = "1"
resvg = "0.45.1"
rustc-hash = "2.1"
semver = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smol = "2"
tempfile = "3"
tree-sitter = "0.26.6"
tree-sitter-bash = "0.25.1"
tree-sitter-css = "0.25.0"
tree-sitter-go = "0.25.0"
tree-sitter-html = "0.23.2"
tree-sitter-json = "0.24.8"
tree-sitter-python = "0.25.0"
tree-sitter-rust = "0.24.0"
tree-sitter-typescript = "0.23.2"
tree-sitter-yaml = "0.7.2"
unicode-segmentation = "1.12"
zed-reqwest = { version = "0.12.15-zed", default-features = false, features = ["blocking", "json", "rustls-tls-native-roots"] }

[workspace.lints.rust]
unsafe_code = "forbid"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"

[profile.release-with-debug]
inherits = "release"
debug = 2
